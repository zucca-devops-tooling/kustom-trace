name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g -XX:+HeapDumpOnOutOfMemoryError"

jobs:
  verify:
    name: Build and Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean assemble --info --no-daemon

      - name: Spotless
        run: ./gradlew check -x test --no-daemon

      - name: Unit tests
        run: ./gradlew :kustomtrace:test --no-daemon

      - name: Functional tests
        run: ./gradlew :functional-test:test --no-daemon --info

  intent:
    name: Resolve Publish Intent
    runs-on: ubuntu-latest
    outputs:
      publish_lib: ${{ steps.flags.outputs.publish_lib }}
      publish_cli: ${{ steps.flags.outputs.publish_cli }}
      create_release: ${{ steps.flags.outputs.create_release }}
    steps:
      - name: Resolve markers from commit message
        id: flags
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          publish_lib=false
          publish_cli=false
          create_release=false

          if [[ "$EVENT_NAME" == "push" ]]; then
            if [[ "$COMMIT_MESSAGE" == *publishLib* || "$COMMIT_MESSAGE" == *publishAll* ]]; then
              publish_lib=true
            fi

            if [[ "$COMMIT_MESSAGE" == *publishCli* || "$COMMIT_MESSAGE" == *publishAll* ]]; then
              publish_cli=true
            fi

            if [[ "$REF_NAME" == "main" && "$COMMIT_MESSAGE" == *release* ]]; then
              publish_lib=true
              publish_cli=true
              create_release=true
            fi
          fi

          {
            echo "publish_lib=$publish_lib"
            echo "publish_cli=$publish_cli"
            echo "create_release=$create_release"
          } >> "$GITHUB_OUTPUT"

  publish-library:
    name: Publish Library
    needs:
      - verify
      - intent
    runs-on: ubuntu-latest
    if: needs.intent.outputs.publish_lib == 'true'
    permissions:
      contents: read
    env:
      # If the token belongs to a service user, set GH_PACKAGES_USERNAME as an org/repo variable.
      GH_PACKAGES_USERNAME: ${{ vars.GH_PACKAGES_USERNAME || github.actor }}
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_KEY_PASS: ${{ secrets.GPG_KEY_PASS }}
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Write GPG key
        run: printf '%s' "${{ secrets.GPG_SECRET_KEY }}" > "$RUNNER_TEMP/gpg-secret-key.asc"

      - name: Publish library
        env:
          GPG_KEY_PATH: ${{ runner.temp }}/gpg-secret-key.asc
        run: |
          ./gradlew :kustomtrace:publish --info --no-daemon \
            -Psigning.keyId="${GPG_KEY_ID}" \
            -Psigning.password="${GPG_KEY_PASS}" \
            -Psigning.secretKeyRingFile="${GPG_KEY_PATH}" \
            -PgithubPackagesUsername="${GH_PACKAGES_USERNAME}" \
            -PgithubPackagesPassword="${GH_PACKAGES_TOKEN}" \
            -PmavenCentralUsername="${OSSRH_USERNAME}" \
            -PmavenCentralPassword="${OSSRH_PASSWORD}"

  publish-cli:
    name: Publish CLI
    needs:
      - verify
      - intent
    runs-on: ubuntu-latest
    if: needs.intent.outputs.publish_cli == 'true'
    permissions:
      contents: read
    env:
      # If the token belongs to a service user, set GH_PACKAGES_USERNAME as an org/repo variable.
      GH_PACKAGES_USERNAME: ${{ vars.GH_PACKAGES_USERNAME || github.actor }}
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Publish CLI
        run: |
          ./gradlew :kustomtrace-cli:publish --info --no-daemon \
            -PgithubPackagesUsername="${GH_PACKAGES_USERNAME}" \
            -PgithubPackagesPassword="${GH_PACKAGES_TOKEN}"

  release:
    name: Tag and Release
    needs:
      - verify
      - intent
      - publish-library
      - publish-cli
    runs-on: ubuntu-latest
    if: needs.intent.outputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build CLI release artifact
        run: ./gradlew :kustomtrace-cli:shadowJar --info --no-daemon

      - name: Tag release
        run: ./gradlew tagRelease --no-daemon

      - name: Read release metadata
        id: release
        run: |
          release_version="$(./gradlew properties -q -Pquiet | awk '/^version:/ { print $2 }')"
          if [[ -z "$release_version" ]]; then
            echo "Failed to read project version." >&2
            exit 1
          fi

          changelog_notes="$(awk "/^## \\[$release_version\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md)"
          if [[ -z "$changelog_notes" ]]; then
            changelog_notes="No specific changelog notes found for this version."
          fi

          shadow_jar_path="$(find cli/build/libs -name 'kustomtrace-cli-*-all.jar' -print -quit)"
          if [[ -z "$shadow_jar_path" ]]; then
            echo "CLI Shadow JAR not found after publish." >&2
            exit 1
          fi

          notes_file="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' "$changelog_notes" > "$notes_file"

          {
            echo "tag_name=v$release_version"
            echo "shadow_jar_path=$shadow_jar_path"
            echo "notes_file=$notes_file"
          } >> "$GITHUB_OUTPUT"

      - name: Push tag
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin "${TAG_NAME}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          SHADOW_JAR_PATH: ${{ steps.release.outputs.shadow_jar_path }}
          NOTES_FILE: ${{ steps.release.outputs.notes_file }}
        run: |
          gh release create "${TAG_NAME}" \
            "${SHADOW_JAR_PATH}" \
            --title "Release ${TAG_NAME}" \
            --notes-file "${NOTES_FILE}"
